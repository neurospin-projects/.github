---
# Workflow to audit Git repositories for potential exposure of UK Biobank data
#
# To run this check locally from the repository folder:
#
# .. code-block:: bash
#
#   $ ukb_git_audit_tool --repo-path . --output audit_report.json
###
name: "Audit[ukb_git_audit_tool]"

on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - "*"

jobs:
  audit:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry
      - name: Install UKB Git Audit Tool
        run: |
          git clone https://github.com/UK-Biobank/UKB-Git-Audit-Tool.git /tmp/ukb-audit
          cd /tmp/ukb-audit
          poetry install
      - name: Set repository URL variable
        run: |
          echo "REPO_URL=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" >> $GITHUB_ENV
      - name: Set repo name
        run: |
          echo "REPO_NAME=$(basename $GITHUB_REPOSITORY)" >> $GITHUB_ENV
      - name: Run audit
        run: |
          cd /tmp/ukb-audit
          poetry run python src/git_audit.py \
            $REPO_URL \
            --output_fpath ./audit_report.csv
      - name: List files
        run: |
          cd /tmp/ukb-audit/${REPO_NAME}
          ls -al
      - name: Upload audit report
        uses: actions/upload-artifact@v6
        with:
          name: ukb-audit-report
          path: |
            /tmp/ukb-audit/${{ env.REPO_NAME }}/audit_report_${{ env.REPO_NAME }}.csv
            /tmp/ukb-audit/${{ env.REPO_NAME }}/eid_frequency_${{ env.REPO_NAME }}.csv
      - name: Validate audit report
        run: |
          EXPECTED="Message,No findings to report."
          FILE="audit_report_${REPO_NAME}.csv"
          ACTUAL=$(tr '\n' ',' < "$FILE" | sed 's/,$//')
          echo "Expected: $EXPECTED"
          echo "Actual:   $ACTUAL"
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "Audit report does not match expected content."
            exit 1
          fi
          echo "Audit report is valid."
